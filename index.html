<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenBite — Fresh Delivery</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "vuww1d8qsp");
</script>
  </head>
  <body>
    <header class="navbar">
      <div class="nav-content">
        <span class="brand">🌿 Green<span>Bite</span></span>
        <div class="cart-indicator" id="nav-cart">
            🛒 <span id="cart-count">0</span>
        </div>
      </div>
      <nav class="stepper">
        <div class="step-item active" data-step="1">Explorar</div>
        <div class="step-item" data-step="2">Menú</div>
        <div class="step-item" data-step="3">Envío</div>
        <div class="step-item" data-step="4">Pago</div>
      </nav>
    </header>

    <main class="container">
      <section id="step-restaurante" class="view active">
        <div class="hero">
          <h2>Comida real a tu puerta</h2>
          <div class="search-bar">
            <select id="filtro-cat">
              <option value="todas">Todas las categorías</option>
              <option value="pizza">🍕 Veggie Pizza</option>
              <option value="asiatica">🍣 Bowls & Sushi</option>
              <option value="hamburguesas">🌱 Plant-Based</option>
            </select>
          </div>
        </div>
        <div id="lista-restaurantes" class="grid-restaurantes"></div>
      </section>

      <section id="step-productos" class="view" hidden>
        <button id="btn-volver-rest" class="btn-back">← Volver a locales</button>
        <h2 id="titulo-restaurante" class="section-title">Menú</h2>
        <div id="lista-platos" class="grid-platos"></div>
        <div class="float-action">
          <button id="btn-ir-checkout" class="btn-main">Siguiente: Datos de envío →</button>
        </div>
      </section>

      <section id="step-envio" class="view" hidden>
        <button id="btn-volver-rest" class="btn-back">← Volver a Pedido</button>
        <h2 class="section-title">📍 Datos de entrega</h2>
        <form id="form-envio" class="card-form">
          <div class="field">
            <label>Calle y número</label>
            <input type="text" id="input-direccion" placeholder="Ej: Calle Falsa 123" required>
          </div>
          <div class="field">
            <label>Notas adicionales</label>
            <textarea id="input-notas" placeholder="Ej: Piso 2, puerta B..."></textarea>
          </div>
          <button type="button" id="btn-ir-resumen" class="btn-main">Revisar pedido</button>
        </form>
      </section>

      <section id="step-resumen" class="view" hidden>
        <h2 class="section-title">🧾 Resumen final</h2>
        <div class="resumen-container">
            <ul id="lista-resumen" class="ticket"></ul>
            <div class="info-entrega-box">
                <p><strong>Entrega en:</strong> <span id="display-dir"></span></p>
            </div>
            <div class="total-bar">
              <span>Total a pagar</span>
              <strong id="total-delivery">0,00 €</strong>
            </div>
        </div>
        <div class="actions">
          <button id="btn-comprar" class="btn-buy">Confirmar y Pagar</button>
        </div>
      </section>

      <section id="step-confirmacion" class="view panel-center" hidden>
        <div class="success-icon">✨</div>
        <h2>¡Todo listo!</h2>
        <p id="msg-confirm"></p>
        <button id="btn-nuevo" class="btn-main">Pedir otra cosa</button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
